name: Deploy to Hostinger

on:
  push:
    branches: [main, staging]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, pdo_sqlite, json, fileinfo
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies and build
        run: |
          npm ci
          npm run build

      - name: Set deploy paths per branch
        id: paths
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "LARAVEL_PATH=/domains/misubaguna.com/laravel/" >> $GITHUB_OUTPUT
            echo "PUBLIC_PATH=/domains/misubaguna.com/public_html/" >> $GITHUB_OUTPUT
          else
            echo "LARAVEL_PATH=/domains/misubaguna.com/laravel-staging/" >> $GITHUB_OUTPUT
            echo "PUBLIC_PATH=/domains/misubaguna.com/public_html/staging/" >> $GITHUB_OUTPUT
          fi
          echo "Deploying branch: ${{ github.ref_name }}"

      - name: Build Hostinger deployment structure
        env:
          LARAVEL_DIR: ${{ github.ref_name == 'main' && 'laravel' || 'laravel-staging' }}
        run: |
          mkdir -p _deploy/laravel
          mkdir -p _deploy/public_html

          for item in * .[^.]*; do
            [ "$item" = "public" ] && continue
            [ "$item" = "_deploy" ] && continue
            [ "$item" = "." ] && continue
            [ "$item" = ".." ] && continue
            cp -r "$item" _deploy/laravel/
          done

          cp -r public/* public/.[^.]* _deploy/public_html/ 2>/dev/null || true

          cat > _deploy/public_html/index.php << PHP_EOF
          <?php

          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          if (file_exists(\$maintenance = __DIR__.'/../$LARAVEL_DIR/storage/framework/maintenance.php')) {
              require \$maintenance;
          }

          require __DIR__.'/../$LARAVEL_DIR/vendor/autoload.php';

          \$app = require_once __DIR__.'/../$LARAVEL_DIR/bootstrap/app.php';

          \$app->handleRequest(Request::capture());
          PHP_EOF

      - name: Deploy Laravel files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: _deploy/laravel/
          server-dir: ${{ steps.paths.outputs.LARAVEL_PATH }}
          dangerous-clean-slate: false

      - name: Deploy public files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: _deploy/public_html/
          server-dir: ${{ steps.paths.outputs.PUBLIC_PATH }}
          dangerous-clean-slate: true
