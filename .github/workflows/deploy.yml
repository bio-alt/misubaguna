name: Deploy to Hostinger

on:
  push:
    branches: [main, staging]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, pdo_sqlite, json, fileinfo
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies and build
        run: |
          npm ci
          npm run build

      - name: Build Hostinger deployment structure
        run: |
          mkdir -p _deploy/laravel
          mkdir -p _deploy/public_html

          for item in *; do
            [ "$item" = "public" ] && continue
            [ "$item" = "_deploy" ] && continue
            [ "$item" = "." ] || [ "$item" = ".." ] && continue
            [ -e "$item" ] || continue
            cp -r "$item" _deploy/laravel/
          done

          for item in .[!.]*; do
            [ "$item" = ".git" ] && continue
            [ -e "$item" ] || continue
            cp -r "$item" _deploy/laravel/
          done

          for item in public/*; do
            [ -e "$item" ] || continue
            cp -r "$item" _deploy/public_html/
          done

          for item in public/.[!.]*; do
            [ -e "$item" ] || continue
            cp -r "$item" _deploy/public_html/
          done

          cat > _deploy/public_html/index.php << 'PHP_EOF'
          <?php

          use Illuminate\Http\Request;

          define('LARAVEL_START', microtime(true));

          if (file_exists($maintenance = __DIR__.'/../laravel-staging/storage/framework/maintenance.php')) {
              require $maintenance;
          }

          require __DIR__.'/../laravel-staging/vendor/autoload.php';

          $app = require_once __DIR__.'/../laravel-staging/bootstrap/app.php';

          $app->handleRequest(Request::capture());
          PHP_EOF

          echo "=== _deploy structure ==="
          ls -la _deploy/laravel/ | head -5
          echo "..."
          ls -la _deploy/public_html/ | head -10
          echo "=== done ==="

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: _deploy/laravel/
          server-dir: /domains/misubaguna.com/laravel-staging/
          dangerous-clean-slate: false

      - name: Deploy public files via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: _deploy/public_html/
          server-dir: /domains/misubaguna.com/public_html/staging/
          dangerous-clean-slate: true
